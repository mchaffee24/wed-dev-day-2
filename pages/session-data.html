<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session Data | Mitch's Movie Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../styles/main.css" />
</head>

<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">Mitch's Movie Tracker</a>
            <div class="d-flex gap-2">
                <a class="btn btn-outline-light btn-sm" href="dashboard.html">Dashboard</a>
                <button id="logout-btn" class="btn btn-outline-warning btn-sm" type="button">
                    Logout
                </button>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <h1 class="h3 mb-3">Session Data</h1>

        <div class="card mb-3">
            <div class="card-body">
                <h2 class="h5">Logged In User</h2>
                <p id="current-user" class="mb-0">Loading...</p>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-body">
                <h2 class="h5">Last Search</h2>
                <p id="last-search" class="mb-0">No search saved yet.</p>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-body">
                <h2 class="h5">Raw Session JSON</h2>
                <pre id="session-json" class="mb-0"></pre>
            </div>
        </div>

        <button id="clear-session" class="btn btn-danger" type="button">Clear Session</button>
    </main>

    <script src="../scripts/auth.js"></script>
    <script src="../scripts/session-data.js"></script>
</body>

</html>
