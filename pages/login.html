<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Mitch's Movie Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/main.css" />
</head>

<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="../index.html">Mitch's Movie Tracker</a>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h1 class="h3 mb-3">Login</h1>
            <p class="text-muted">Use the password <strong>movie123</strong> to enter.</p>

            <form id="login-form">
              <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input id="username" class="form-control" type="text" required />
              </div>

              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input id="password" class="form-control" type="password" required />
              </div>

              <button class="btn btn-primary w-100" type="submit">Login</button>
            </form>

            <p id="login-message" class="text-danger mt-3 mb-0"></p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="../scripts/auth.js"></script>
</body>

</html>
